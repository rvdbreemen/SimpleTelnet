name=AsyncSimpleTelnet
version=0.1.0-prototype
author=Robert van den Breemen
maintainer=Robert van den Breemen
sentence=Event-driven (AsyncTCP) multi-client Telnet server for ESP32, drop-in API of SimpleTelnet.
paragraph=AsyncSimpleTelnet is the asynchronous ESP32 counterpart of SimpleTelnet, built on AsyncTCP (same ecosystem as ESPAsyncWebServer). Same public API and callbacks (const char*, no String), but fully event-driven: no loop() polling. Preserves the Arduino Stream interface via per-client RX ring buffers and handles TX backpressure via the onAck event. Shares the SimpleTelnetCore protocol logic with SimpleTelnet.
category=Communication
url=https://github.com/rvdbreemen/SimpleTelnet
architectures=esp32
depends=AsyncTCP
