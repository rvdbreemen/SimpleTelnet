name=SimpleTelnet
version=2.0.0
author=Robert van den Breemen
maintainer=Robert van den Breemen
sentence=A multi-client Telnet library for ESP8266 and ESP32 with synchronous and optional async (AsyncTCP) variants
paragraph=SimpleTelnet provides a multi-client telnet server with two explicit modes: streaming (like TelnetStream) and CLI/line-input (like ESPTelnet). Callbacks use const char* (no String), minimal RAM, multiple independent instances, and RFC 854 option negotiation. Include SimpleTelnet.h for the synchronous WiFiServer variant (ESP8266 + ESP32), or AsyncSimpleTelnet.h for the event-driven AsyncTCP variant (ESP32). AsyncTCP is an OPTIONAL dependency: install ESP32Async/AsyncTCP only if you use the async header. Drop-in API superset of TelnetStream, ESPTelnet, and ESPTelnetStream.
category=Communication
url=https://github.com/rvdbreemen/SimpleTelnet
architectures=esp8266,esp32
