sentence=A multi-client Telnet library for ESP8266 and ESP32 supporting both CLI and streaming modes
paragraph=SimpleTelnet provides a multi-client telnet server with two explicit modes: streaming (like TelnetStream) and CLI/line-input (like ESPTelnet). Supports callbacks with const char* (no String), minimal RAM usage, and multiple independent instances. Drop-in API superset of TelnetStream, ESPTelnet, and ESPTelnetStream.
